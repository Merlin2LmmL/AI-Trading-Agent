# ── API Sources ────────────────────────────────────────────────────────────────
api_sources:

  finnhub:
    enabled: true
    categories:
      - general          # General market news
      - forex            # FX and macro
      - merger           # M&A
    # Tickers to specifically pull news for (besides portfolio holdings):
    tracked_tickers:
      - NVDA
      - AAPL
      - MSFT
      - TSLA
      - AMZN
      - GOOGL
      - META
      - SAP   # SAP SE (DAX)
      - ASML  # ASML (EU tech)

  newsapi:
    enabled: true
    queries:
      - "insider buying significant stock"
      - "earnings beat guidance raise surprise"
      - "analyst upgrade price target raise strong buy"
      - "short squeeze potential high short interest"
      - "FDA clinical trial approval biotech"
      - "merger acquisition buyout definitive agreement"
      - "Aktien Kursziel Empfehlung Kaufen Aufstufung" # German: Stock target recommendation buy upgrade
      - "Gewinnprognose Ausblick angehoben"           # German: Earnings forecast outlook raised
    language_filter:
      - en
      - de
    # Articles from last N hours (keep to 24 for daily run)
    lookback_hours: 24

# ── Fetch Settings ────────────────────────────────────────────────────────────
fetch:
  # Max concurrent RSS requests
  rss_concurrency: 10
  # Request timeout in seconds
  timeout: 15
  # User agent (polite scraping)
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  # Max articles per RSS feed per run (avoid token explosion)
  max_articles_per_feed: 10
  # Only articles published within this many hours
  max_age_hours: 24
  # Podcasts often publish less frequently; use a wider window
  podcast_max_age_hours: 48
